<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Manga - AniNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/manga-theme.css?v=6">
    <style>
        .dir-filters {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            max-width: 1200px; margin: 18px auto 4px; padding: 0 20px;
        }
        .dir-filters select, .dir-filters input {
            background: #161a20; color: #eee; border: 1px solid #2a2f37;
            border-radius: 8px; padding: 9px 12px; font-family: inherit; font-size: .85rem;
        }
        .dir-filters select:focus, .dir-filters input:focus { outline: none; border-color: #2b8a5c; }
        .dir-filters input { flex: 1; min-width: 160px; }
        .dir-filters button {
            background: #2b8a5c; color: #fff; border: none; border-radius: 8px;
            padding: 9px 18px; font-family: inherit; font-weight: 700; cursor: pointer;
        }
        .dir-pagination {
            display: flex; gap: 10px; justify-content: center; align-items: center;
            padding: 26px 0 10px;
        }
        .dir-pagination button {
            background: #161a20; color: #ccc; border: 1px solid #2a2f37;
            border-radius: 8px; padding: 9px 16px; font-family: inherit; cursor: pointer;
        }
        .dir-pagination button:disabled { opacity: .35; cursor: not-allowed; }
        .dir-pagination .pg { color: #8a8f98; font-size: .85rem; }
    </style>
</head>
<body data-page="manga-dir">
    <header>
        <div class="header-inner">
            <div class="logo"><a href="../index.html"><h1>Ani<span class="hl">Nova</span> Manga</h1></a></div>
            <nav><ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="directorio.html" class="active">Directorio</a></li>
                <li><a href="../anime/index.html">Anime</a></li>
                <li><a href="../novelas/index.html">Novelas</a></li>
                <li><a href="../cuenta.html"><i class="fas fa-user"></i> Cuenta</a></li>
            </ul></nav>
        </div>
    </header>

    <div class="dir-filters">
        <select id="fType">
            <option value="">Todos los tipos</option>
            <option value="manga">Manga</option>
            <option value="manhwa">Manhwa</option>
            <option value="manhua">Manhua</option>
            <option value="novela">Novela</option>
        </select>
        <select id="fGenre"><option value="">Todos los géneros</option></select>
        <input id="fQuery" placeholder="Buscar por título…">
        <button id="fGo"><i class="fas fa-filter"></i> Filtrar</button>
    </div>

    <main class="container section">
        <div class="section-header"><h3 id="dirTitle"><i class="fas fa-compass"></i> Directorio</h3></div>
        <div class="manga-grid" id="dirGrid"></div>
        <div class="dir-pagination">
            <button id="pgPrev"><i class="fas fa-chevron-left"></i> Anterior</button>
            <span class="pg" id="pgInfo">–</span>
            <button id="pgNext">Siguiente <i class="fas fa-chevron-right"></i></button>
        </div>
    </main>

    <footer>
        <p><strong>Aviso importante</strong><br>
        Catálogo vía MangaLect · Proyecto personal sin ánimo de lucro · No alojamos archivos<br>
        © 2025 – 2026 AniNova – Todos los derechos pertenecen a sus autores y editoriales.</p>
    </footer>

    <script>
        const VERCEL_PROJECT = 'pagina-ver-anime';
        const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://localhost:3000/api'
            : `https://${VERCEL_PROJECT}.vercel.app/api`;

        let page = 1, totalPages = 1;

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        function escA(s) { return (s || '').replace(/"/g, '&quot;'); }

        function cardHtml(m) {
            return `
                <div class="manga-card" onclick="location.href='manga.html?id=${encodeURIComponent(m.id)}'">
                    ${m.cover ? `<img src="${escA(m.cover)}" alt="" loading="lazy" referrerpolicy="no-referrer">` : ''}
                    <div class="card-info">
                        <span class="badge">${esc(m.type || 'Manga')}</span>
                        <h4>${esc(m.title)}</h4>
                    </div>
                </div>`;
        }

        async function loadGenres() {
            try {
                const res = await fetch(`${API}/manga/genres`);
                const data = await res.json();
                if (!data.success) return;
                const sel = document.getElementById('fGenre');
                for (const g of data.genres) {
                    const o = document.createElement('option');
                    o.value = g.name;      // la fuente filtra por NOMBRE de género
                    o.textContent = g.name;
                    sel.appendChild(o);
                }
            } catch { /* sin géneros */ }
        }

        async function loadPage(p) {
            page = p;
            const grid = document.getElementById('dirGrid');
            grid.innerHTML = Array(12).fill('<div class="skeleton"></div>').join('');
            const q = document.getElementById('fQuery').value.trim();
            const type = document.getElementById('fType').value;
            const genre = document.getElementById('fGenre').value;
            const params = new URLSearchParams({ page: p });
            if (q) params.set('q', q);
            if (type) params.set('type', type);
            if (genre) params.set('genre', genre);
            try {
                const res = await fetch(`${API}/manga/directory?${params}`);
                const data = await res.json();
                if (!data.success || !data.items.length) {
                    grid.innerHTML = `
                        <div class="error-box" style="grid-column:1/-1">Sin resultados con esos filtros.</div>
                        <div style="grid-column:1/-1;text-align:center;padding:10px">
                            <a href="https://zonatmo.org/biblioteca?title=${encodeURIComponent(q)}" target="_blank" rel="noopener"
                               style="display:inline-block;background:#2b8a5c;color:#fff;text-decoration:none;padding:11px 22px;border-radius:8px;font-weight:700;font-size:.9rem">
                                <i class="fas fa-external-link-alt"></i> Buscar en ZonaTMO
                            </a>
                        </div>`;
                    totalPages = 1;
                } else {
                    grid.innerHTML = data.items.map(cardHtml).join('');
                    totalPages = data.totalPages || 1;
                    document.getElementById('dirTitle').innerHTML =
                        `<i class="fas fa-compass"></i> Directorio <span style="color:#8a8f98;font-size:.8rem;font-weight:400">· ${data.total} títulos</span>`;
                }
            } catch {
                grid.innerHTML = '<div class="error-box" style="grid-column:1/-1">Error de conexión.</div>';
            }
            document.getElementById('pgInfo').textContent = `Página ${page} de ${totalPages}`;
            document.getElementById('pgPrev').disabled = page <= 1;
            document.getElementById('pgNext').disabled = page >= totalPages;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('fGo').onclick = () => loadPage(1);
        document.getElementById('fQuery').addEventListener('keydown', e => { if (e.key === 'Enter') loadPage(1); });
        document.getElementById('fType').onchange = () => loadPage(1);
        document.getElementById('fGenre').onchange = () => loadPage(1);
        document.getElementById('pgPrev').onclick = () => { if (page > 1) loadPage(page - 1); };
        document.getElementById('pgNext').onclick = () => { if (page < totalPages) loadPage(page + 1); };

        loadGenres();
        loadPage(1);
    </script>
</body>
</html>
