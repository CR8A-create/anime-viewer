<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga - AniNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/manga-theme.css?v=6">
</head>
<body data-page="manga-detail">
    <header>
        <div class="header-inner">
            <div class="logo"><a href="../index.html"><h1>Ani<span class="hl">Nova</span> Manga</h1></a></div>
            <nav><ul>
                <li><a href="index.html">Catálogo</a></li>
                <li><a href="../anime/index.html">Anime</a></li>
                <li><a href="../novelas/index.html">Novelas</a></li>
            </ul></nav>
        </div>
    </header>

    <section class="detail-hero">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-inner">
            <div class="cover-box" id="coverBox"><div class="skeleton" style="width:100%;height:100%"></div></div>
            <div class="hero-info">
                <h2 id="title">Cargando…</h2>
                <div class="meta-row" id="metaRow"></div>
                <div class="genre-chips" id="genreChips"></div>
                <p class="synopsis" id="synopsis"></p>
                <button class="synopsis-toggle" id="synToggle" style="display:none">Leer más</button>
                <div class="cta-row" id="ctaRow"></div>
            </div>
        </div>
    </section>

    <section class="chapters-section">
        <div class="section-header"><h3><i class="fas fa-list-ol"></i> Capítulos</h3></div>
        <div class="chapter-list" id="chapterList"><div class="loading">Cargando capítulos…</div></div>
    </section>

    <footer>
        <p><strong>Aviso importante</strong><br>
        Lectura vía ZonaTMO y MangaDex · Proyecto personal sin ánimo de lucro · No alojamos archivos<br>
        © 2025 – 2026 AniNova – Todos los derechos pertenecen a sus autores y editoriales.</p>
    </footer>

    <script src="../assets/js/mi-lista.js?v=1"></script>
    <script>
        const VERCEL_PROJECT = 'pagina-ver-anime';
        const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://localhost:3000/api'
            : `https://${VERCEL_PROJECT}.vercel.app/api`;
        const id = new URLSearchParams(location.search).get('id');
        const listKey = 'manga-' + id;
        let manga = null, chapters = [];

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        function openReader(chId) {
            const t = (manga && manga.title) ? `&title=${encodeURIComponent(manga.title)}` : '';
            location.href = `leer.html?manga=${encodeURIComponent(id)}&chapter=${encodeURIComponent(chId)}${t}`;
        }

        async function init() {
            if (!id) { location.href = 'index.html'; return; }
            let info, chData;
            try {
                [info, chData] = await Promise.all([
                    fetch(`${API}/manga/info?id=${encodeURIComponent(id)}`).then(r => r.json()),
                    fetch(`${API}/manga/chapters?id=${encodeURIComponent(id)}`).then(r => r.json()),
                ]);
            } catch { document.getElementById('title').textContent = 'Error de conexión.'; return; }

            if (!info.success) { document.getElementById('title').textContent = 'No se encontró este manga.'; return; }
            manga = info.data;
            document.title = `${manga.title} - AniNova`;
            document.getElementById('title').textContent = manga.title;
            if (manga.coverFull) {
                document.getElementById('coverBox').innerHTML = `<img src="${manga.coverFull}" referrerpolicy="no-referrer" alt="Portada">`;
                document.getElementById('heroBg').style.backgroundImage = `url('${manga.coverFull}')`;
            }
            const meta = document.getElementById('metaRow');
            const badge = manga.type || (manga.originalLanguage === 'ko' ? 'Manhwa' : 'Manga');
            const estado = { ongoing: 'En curso', completed: 'Completo', hiatus: 'En pausa', cancelled: 'Cancelado' }[manga.status] || manga.status;
            meta.innerHTML = `<span class="chip">${esc(badge)}</span>`;
            if (estado) meta.innerHTML += `<span class="meta-item"><i class="fas fa-circle-info"></i>${esc(estado)}</span>`;
            if (manga.rating) meta.innerHTML += `<span class="meta-item"><i class="fas fa-star"></i>${esc(manga.rating)}</span>`;
            if (manga.year) meta.innerHTML += `<span class="meta-item"><i class="fas fa-calendar"></i>${manga.year}</span>`;
            if (manga.author) meta.innerHTML += `<span class="meta-item"><i class="fas fa-pen"></i>${esc(manga.author)}</span>`;

            document.getElementById('genreChips').innerHTML = (manga.tags || []).slice(0, 8).map(t => `<span class="genre-chip">${esc(t)}</span>`).join('');

            const syn = document.getElementById('synopsis');
            syn.textContent = manga.description || 'Sin descripción disponible.';
            const tog = document.getElementById('synToggle');
            requestAnimationFrame(() => {
                if (syn.scrollHeight > syn.clientHeight + 4) {
                    tog.style.display = 'block';
                    tog.onclick = () => { const ex = syn.classList.toggle('expanded'); tog.textContent = ex ? 'Leer menos' : 'Leer más'; };
                }
            });

            chapters = (chData.success && chData.chapters) ? chData.chapters : [];

            renderCtas();
            renderChapters();
        }

        function renderCtas() {
            const cta = document.getElementById('ctaRow');
            cta.innerHTML = '';
            if (chapters.length > 0) {
                const first = chapters[0];
                const b = document.createElement('button');
                b.className = 'btn-read';
                b.innerHTML = `<i class="fas fa-book-open"></i> Leer Cap. ${first.chapter}`;
                b.onclick = () => openReader(first.id);
                cta.appendChild(b);
                // continuar si hay progreso guardado
                const last = MiLista.getMangaProgress ? MiLista.getMangaProgress(listKey) : null;
                if (last) {
                    const cont = chapters.find(c => c.chapter === last);
                    if (cont) {
                        const cb = document.createElement('button');
                        cb.className = 'btn-read secondary';
                        cb.innerHTML = `<i class="fas fa-rotate-right"></i> Continuar Cap. ${last}`;
                        cb.onclick = () => openReader(cont.id);
                        cta.appendChild(cb);
                    }
                }
            }
            // favorito
            const fav = document.createElement('button');
            const paint = () => {
                const on = MiLista.isFav(listKey);
                fav.className = 'btn-read ' + (on ? 'fav-active' : 'secondary');
                fav.innerHTML = on ? '<i class="fas fa-heart"></i> En Favoritos' : '<i class="far fa-heart"></i> Favorito';
            };
            paint();
            fav.onclick = () => {
                MiLista.toggleFav({ key: listKey, title: manga.title, image: manga.cover || manga.coverFull || '', url: `manga.html?id=${encodeURIComponent(id)}`, kind: 'manga' });
                paint();
            };
            cta.appendChild(fav);
        }

        function renderChapters() {
            const list = document.getElementById('chapterList');
            if (chapters.length === 0) {
                list.innerHTML = '<div class="error-box">No hay capítulos en español disponibles todavía.</div>';
                return;
            }
            const readSet = MiLista.getReadChapters ? MiLista.getReadChapters(listKey) : {};
            list.innerHTML = '';
            // Más recientes primero
            [...chapters].reverse().forEach(c => {
                const row = document.createElement('div');
                row.className = 'chapter-row' + (readSet[c.chapter] ? ' read' : '');
                row.onclick = () => openReader(c.id);
                const sub = c.pages ? `${c.pages} páginas · ${c.lang === 'es-la' ? 'Español latino' : 'Español'}` : 'Español';
                // Nombre extra del capítulo (quita el "Capítulo N" repetido)
                const extra = (c.title || '').replace(/^\s*cap[ií]tulo\s*[\d.]+\s*/i, '').trim();
                row.innerHTML = `
                    <div class="ch-num">${c.chapter}</div>
                    <div class="ch-info">
                        <div class="ch-title">Capítulo ${c.chapter}${extra ? ' · ' + esc(extra) : ''}</div>
                        <div class="ch-sub">${sub}</div>
                    </div>
                    <i class="fas fa-chevron-right ch-arrow"></i>`;
                list.appendChild(row);
            });
        }

        init();
    </script>
</body>
</html>
