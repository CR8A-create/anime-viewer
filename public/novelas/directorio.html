<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Novelas - AniNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/novelas-theme.css?v=6">
    <style>
        .dir-filters {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            max-width: 1200px; margin: 18px auto 4px; padding: 0 20px;
        }
        .dir-filters select, .dir-filters input {
            background: #1a1610; color: #eee; border: 1px solid #37301f;
            border-radius: 8px; padding: 9px 12px; font-family: inherit; font-size: .85rem;
        }
        .dir-filters select:focus, .dir-filters input:focus { outline: none; border-color: #d19a2f; }
        .dir-filters input { flex: 1; min-width: 160px; }
        .dir-filters button {
            background: #d19a2f; color: #1a1408; border: none; border-radius: 8px;
            padding: 9px 18px; font-family: inherit; font-weight: 800; cursor: pointer;
        }
        .dir-pagination {
            display: flex; gap: 10px; justify-content: center; align-items: center;
            padding: 26px 0 10px;
        }
        .dir-pagination button {
            background: #1a1610; color: #ccc; border: 1px solid #37301f;
            border-radius: 8px; padding: 9px 16px; font-family: inherit; cursor: pointer;
        }
        .dir-pagination button:disabled { opacity: .35; cursor: not-allowed; }
        .dir-pagination .pg { color: #8a8f98; font-size: .85rem; }
    </style>
</head>
<body data-page="novelas-dir">
    <header>
        <div class="header-inner">
            <div class="logo"><a href="../index.html"><h1>Ani<span class="hl">Nova</span> Novelas</h1></a></div>
            <nav><ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="directorio.html" class="active">Directorio</a></li>
                <li><a href="../anime/index.html">Anime</a></li>
                <li><a href="../manga/index.html">Manga</a></li>
                <li><a href="../cuenta.html"><i class="fas fa-user"></i> Cuenta</a></li>
            </ul></nav>
        </div>
    </header>

    <div class="dir-filters">
        <select id="fStatus">
            <option value="">Todos los estados</option>
            <option value="active">En curso</option>
            <option value="finished">Completa</option>
            <option value="paused">En pausa</option>
        </select>
        <select id="fOrder">
            <option value="recent">Última actualización</option>
            <option value="rating">Mejor valoradas</option>
            <option value="views">Más leídas</option>
            <option value="chapters">Más capítulos</option>
        </select>
        <input id="fQuery" placeholder="Buscar por título o autor…">
        <button id="fGo"><i class="fas fa-filter"></i> Filtrar</button>
    </div>

    <main class="container section">
        <div class="section-header"><h3 id="dirTitle"><i class="fas fa-compass"></i> Directorio</h3></div>
        <div class="novel-grid" id="dirGrid"></div>
        <div class="dir-pagination">
            <button id="pgPrev"><i class="fas fa-chevron-left"></i> Anterior</button>
            <span class="pg" id="pgInfo">–</span>
            <button id="pgNext">Siguiente <i class="fas fa-chevron-right"></i></button>
        </div>
    </main>

    <footer>
        <p><strong>Aviso importante</strong><br>
        Lectura vía SkyNovels (traducciones de su comunidad) · Proyecto personal sin ánimo de lucro<br>
        © 2025 – 2026 AniNova – Todos los derechos pertenecen a sus autores y traductores.</p>
    </footer>

    <script>
        const VERCEL_PROJECT = 'pagina-ver-anime';
        const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://localhost:3000/api'
            : `https://${VERCEL_PROJECT}.vercel.app/api`;

        let page = 1, totalPages = 1;

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        function cardHtml(n) {
            return `
                <div class="novel-card" onclick="location.href='novela.html?id=${n.id}'">
                    ${n.cover ? `<img src="${n.cover}" alt="" loading="lazy" referrerpolicy="no-referrer">` : ''}
                    <div class="card-info">
                        <span class="badge">${n.chapters || '?'} caps${n.rating ? ' · ★' + Number(n.rating).toFixed(1) : ''}</span>
                        <h4>${esc(n.title)}</h4>
                    </div>
                </div>`;
        }

        async function loadPage(p) {
            page = p;
            const grid = document.getElementById('dirGrid');
            grid.innerHTML = Array(12).fill('<div class="skeleton"></div>').join('');
            const params = new URLSearchParams({ page: p, order: document.getElementById('fOrder').value });
            const q = document.getElementById('fQuery').value.trim();
            const st = document.getElementById('fStatus').value;
            if (q) params.set('q', q);
            if (st) params.set('status', st);
            try {
                const res = await fetch(`${API}/novels/directory?${params}`);
                const data = await res.json();
                if (!data.success || !data.data.length) {
                    grid.innerHTML = '<div class="error-box" style="grid-column:1/-1">Sin resultados con esos filtros.</div>';
                    totalPages = 1;
                } else {
                    grid.innerHTML = data.data.map(cardHtml).join('');
                    totalPages = data.totalPages || 1;
                    document.getElementById('dirTitle').innerHTML =
                        `<i class="fas fa-compass"></i> Directorio <span style="color:#8a8f98;font-size:.8rem;font-weight:400">· ${data.total} novelas</span>`;
                }
            } catch {
                grid.innerHTML = '<div class="error-box" style="grid-column:1/-1">Error de conexión.</div>';
            }
            document.getElementById('pgInfo').textContent = `Página ${page} de ${totalPages}`;
            document.getElementById('pgPrev').disabled = page <= 1;
            document.getElementById('pgNext').disabled = page >= totalPages;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('fGo').onclick = () => loadPage(1);
        document.getElementById('fQuery').addEventListener('keydown', e => { if (e.key === 'Enter') loadPage(1); });
        document.getElementById('fStatus').onchange = () => loadPage(1);
        document.getElementById('fOrder').onchange = () => loadPage(1);
        document.getElementById('pgPrev').onclick = () => { if (page > 1) loadPage(page - 1); };
        document.getElementById('pgNext').onclick = () => { if (page < totalPages) loadPage(page + 1); };

        loadPage(1);
    </script>
</body>
</html>
